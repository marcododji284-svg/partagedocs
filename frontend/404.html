<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable – PartageDocs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8fafc; --bg-alt: #ffffff; --text: #1e293b; --text-muted: #64748b;
      --text-soft: #475569; --border: #e2e8f0; --accent: #2563eb; --accent-soft: #eff6ff;
      color-scheme: light;
    }
    html[data-theme="dark"] {
      --bg: #0b1120; --bg-alt: #111827; --text: #e2e8f0; --text-muted: #94a3b8;
      --text-soft: #cbd5e1; --border: #1f2a3d; --accent: #60a5fa; --accent-soft: #16213a;
      color-scheme: dark;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 2rem;
      transition: background-color 0.35s ease, color 0.35s ease;
    }
    .code {
      font-family: 'Source Serif 4', serif; font-size: 5rem; font-weight: 700;
      color: var(--accent); line-height: 1; margin-bottom: 0.5rem;
    }
    h1 { font-family: 'Source Serif 4', serif; font-size: 1.6rem; font-weight: 600; margin-bottom: 0.75rem; }
    p { color: var(--text-muted); font-size: 1rem; max-width: 420px; margin-bottom: 2rem; line-height: 1.6; }
    .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    .btn-primary, .btn-secondary {
      display: inline-flex; align-items: center; gap: 0.5rem; font-family: inherit;
      font-size: 0.92rem; font-weight: 600; border-radius: 8px; padding: 0.7rem 1.3rem;
      text-decoration: none; cursor: pointer; border: 1px solid transparent;
    }
    .btn-primary { color: #fff; background: var(--accent); }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-secondary { color: var(--text-soft); background: var(--bg-alt); border-color: var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary svg, .btn-secondary svg { width: 16px; height: 16px; fill: currentColor; }
    .illustration { width: 120px; height: 120px; margin-bottom: 1.5rem; }
    .illustration svg { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="illustration">
    <svg viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="11" stroke="var(--accent-soft)" stroke-width="2" fill="var(--accent-soft)"/>
      <path d="M9 9l6 6M15 9l-6 6" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="code">404</div>
  <h1>Cette page n'existe pas</h1>
  <p>Le document ou la page que vous cherchez a peut-être été déplacé, supprimé, ou l'adresse contient une erreur.</p>
  <div class="actions">
    <a href="index.html" class="btn-primary">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Retour à l'accueil
    </a>
    <a href="contact.html" class="btn-secondary">Signaler un lien cassé</a>
  </div>

  <script>
    (function() {
      const root = document.documentElement;
      function getPreferredTheme() {
        const saved = localStorage.getItem('partagedocs-theme');
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      root.setAttribute('data-theme', getPreferredTheme());
    })();
  </script>
</body>
</html>
